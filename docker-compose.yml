services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: freiwerk
      POSTGRES_PASSWORD: freiwerk
      POSTGRES_DB: freiwerk
    ports:
      - '5432:5432'
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U freiwerk']
      interval: 5s
      timeout: 5s
      retries: 10

  # Development app: bind-mounts source, installs deps + migrates + seeds on start.
  app:
    build:
      context: .
      target: dev
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      NUXT_PUBLIC_APP_MODE: ${NUXT_PUBLIC_APP_MODE:-dev}
      NUXT_DEV_ALLOWED_HOSTS: ${NUXT_DEV_ALLOWED_HOSTS:-}
      DATABASE_URL: postgresql://freiwerk:freiwerk@db:5432/freiwerk
      NUXT_SESSION_PASSWORD: dev-only-session-password-change-me-please-32
      # Set to "true" only when the app is served over HTTPS. Over plain HTTP
      # (the default for local/demo), Secure cookies break login on remote hosts.
      NUXT_SESSION_COOKIE_SECURE: ${NUXT_SESSION_COOKIE_SECURE:-false}
      # Passwordless login email (SMTP). Empty host => magic links are printed to
      # this container's logs instead of being emailed. Override in .env to send
      # real mail (see .env.example for the NUXT_SMTP_* variables).
      NUXT_SMTP_HOST: ${NUXT_SMTP_HOST:-}
      NUXT_SMTP_PORT: ${NUXT_SMTP_PORT:-587}
      NUXT_SMTP_SECURE: ${NUXT_SMTP_SECURE:-}
      NUXT_SMTP_USER: ${NUXT_SMTP_USER:-}
      NUXT_SMTP_PASS: ${NUXT_SMTP_PASS:-}
      NUXT_SMTP_FROM: ${NUXT_SMTP_FROM:-FreiWerk <no-reply@freiwerk.local>}
      POSTGRES_HOST: db
      POSTGRES_PORT: '5432'
      POSTGRES_USER: freiwerk
      NITRO_HOST: '0.0.0.0'
      NITRO_PORT: '3000'
    ports:
      - '${APP_PORT:-3000}:3000'
    volumes:
      - .:/app
      - app-node-modules:/app/node_modules
      - uploads-data:/app/public/uploads

  # Production-like app behind nginx. Enable with: docker compose --profile prod up --build
  app-prod:
    build:
      context: .
      target: prod
    restart: unless-stopped
    profiles: ['prod']
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NUXT_PUBLIC_APP_MODE: production
      DATABASE_URL: postgresql://freiwerk:freiwerk@db:5432/freiwerk
      NUXT_SESSION_PASSWORD: prod-change-me-to-a-long-random-secret-32chars
      # Set to "true" once the deployment is fronted by HTTPS (TLS terminated at
      # nginx or an upstream proxy). The bundled nginx serves plain HTTP, so the
      # default stays false to keep magic-link/demo login working.
      NUXT_SESSION_COOKIE_SECURE: ${NUXT_SESSION_COOKIE_SECURE:-false}
      POSTGRES_HOST: db
      POSTGRES_PORT: '5432'
      POSTGRES_USER: freiwerk
      NITRO_HOST: '0.0.0.0'
      NITRO_PORT: '3000'
    expose:
      - '3000'
    volumes:
      - uploads-data:/app/public/uploads

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    profiles: ['prod']
    depends_on:
      - app-prod
    ports:
      - '8080:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  # Named volumes persist across `docker compose down` (omit `-v`).
  db-data:
    name: freiwerk-db-data
  uploads-data:
    name: freiwerk-uploads-data
  app-node-modules:
    name: freiwerk-node-modules
