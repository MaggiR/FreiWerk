services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: freiwerk
      POSTGRES_PASSWORD: freiwerk
      POSTGRES_DB: freiwerk
    ports:
      - '5432:5432'
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U freiwerk']
      interval: 5s
      timeout: 5s
      retries: 10

  # Development app: bind-mounts source, installs deps + migrates + seeds on start.
  app:
    build:
      context: .
      target: dev
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://freiwerk:freiwerk@db:5432/freiwerk
      NUXT_SESSION_PASSWORD: dev-only-session-password-change-me-please-32
      POSTGRES_HOST: db
      POSTGRES_PORT: '5432'
      POSTGRES_USER: freiwerk
      NITRO_HOST: '0.0.0.0'
      NITRO_PORT: '3000'
    ports:
      - '${APP_PORT:-3000}:3000'
    volumes:
      - .:/app
      - app-node-modules:/app/node_modules
      - uploads-data:/app/public/uploads

  # Production-like app behind nginx. Enable with: docker compose --profile prod up --build
  app-prod:
    build:
      context: .
      target: prod
    restart: unless-stopped
    profiles: ['prod']
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://freiwerk:freiwerk@db:5432/freiwerk
      NUXT_SESSION_PASSWORD: prod-change-me-to-a-long-random-secret-32chars
      POSTGRES_HOST: db
      POSTGRES_PORT: '5432'
      POSTGRES_USER: freiwerk
      NITRO_HOST: '0.0.0.0'
      NITRO_PORT: '3000'
    expose:
      - '3000'
    volumes:
      - uploads-data:/app/public/uploads

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    profiles: ['prod']
    depends_on:
      - app-prod
    ports:
      - '8080:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  # Named volumes persist across `docker compose down` (omit `-v`).
  db-data:
    name: freiwerk-db-data
  uploads-data:
    name: freiwerk-uploads-data
  app-node-modules:
    name: freiwerk-node-modules
